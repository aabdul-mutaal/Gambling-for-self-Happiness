<!DOCTYPE html>
<html>
<head>
  <title>Gambling for Self-Happiness</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
        --gold: #ffd700; --red: #ff4d4d; --purple: #a335ee; --blue: #0070dd; --grey: #b2b2b2; 
        --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #333; --error: #ff4d4d; --success: #2ecc71;
        --input-bg: #252525; --input-text: #ffffff; --spiral-alt: #ffffff;
    }
    body.light-mode { 
        --bg: #ffffff; --card: #f8f8f8; --text: #121212; --accent: #ddd; 
        --input-bg: #eeeeee; --input-text: #000000; --spiral-alt: #000000; 
    }
    
    body { width: 350px; height: 420px; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; perspective: 1500px; transition: background 0.3s; }

    #internal-alert { 
        position: absolute; top: -60px; left: 0; right: 0; height: 0px; 
        display: flex; align-items: center; justify-content: center; 
        font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 10000; transition: 0.3s;
    }
    #internal-alert.show { top: 0; height: 45px; }
    .alert-error { background: var(--error); color: white; }
    .alert-success { background: var(--success); color: white; }

    #game-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 360px; padding-top: 0px; position: relative; }
    #case-area { position: relative; display: flex; align-items: center; justify-content: center; height: 180px; width: 100%; }
    
    .case-glow { 
      position: absolute; width: 215px; height: 215px; 
      background: conic-gradient(var(--gold) 0deg 15deg, var(--spiral-alt) 15deg 30deg, var(--gold) 30deg 45deg, var(--spiral-alt) 45deg 60deg, var(--gold) 60deg 75deg, var(--spiral-alt) 75deg 90deg, var(--gold) 90deg 105deg, var(--spiral-alt) 105deg 120deg, var(--gold) 120deg 135deg, var(--spiral-alt) 135deg 150deg, var(--gold) 150deg 165deg, var(--spiral-alt) 165deg 180deg, var(--gold) 180deg 195deg, var(--spiral-alt) 195deg 210deg, var(--gold) 210deg 225deg, var(--spiral-alt) 225deg 240deg, var(--gold) 240deg 255deg, var(--spiral-alt) 255deg 270deg, var(--gold) 270deg 285deg, var(--spiral-alt) 285deg 300deg, var(--gold) 300deg 315deg, var(--spiral-alt) 315deg 330deg, var(--gold) 330deg 345deg, var(--spiral-alt) 345deg 360deg);
      border-radius: 50%; z-index: 1; animation: sharpSpiral 10s linear infinite; -webkit-mask-image: radial-gradient(circle, transparent 20%, black 60%);
      opacity: 0.5; transition: opacity 0.3s;
    }

    @keyframes sharpSpiral { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #case-gif { width: 165px; cursor: pointer; z-index: 2; transition: opacity 0.3s; }
    .shaking { animation: caseShake 0.1s infinite; }
    @keyframes caseShake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

    #viewport { 
        width: 250px; height: 0px; opacity: 0; border: 2px solid var(--accent); position: absolute; 
        overflow: hidden; border-radius: 12px; background: rgba(0, 0, 0, 0.7); 
        z-index: 10; transition: height 0.8s, opacity 0.6s; 
        display: flex; align-items: center;
        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
    }
    #viewport.expanding { height: 100px; opacity: 1; }

    #magnifier {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 82px; height: 82px; border: 2px solid var(--gold);
        border-radius: 8px; z-index: 100; pointer-events: none;
        backdrop-filter: brightness(1.2) contrast(1.1);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    #reveal-container {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0) translateZ(100px);
        width: 150px; height: 150px; background: var(--card); border: 5px solid transparent;
        border-radius: 12px; z-index: 999; overflow: hidden; opacity: 0;
        transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        pointer-events: none;
    }
    #reveal-container.active { transform: translate(-50%, -50%) scale(1) translateZ(200px); opacity: 1; }
    #reveal-container img { width: 100%; height: 100%; object-fit: cover; }

    #slider { display: flex; position: absolute; left: 0; align-items: center; height: 100%; transition: left 8s cubic-bezier(0.1, 0, 0, 1); }
    .item { 
        min-width: 80px; width: 80px; height: 80px; margin: 0 2px; 
        background: #222; border-radius: 6px; flex-shrink: 0; 
        overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .item img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; display: block; }

    @keyframes goldPulse {
        0%   { box-shadow: 0 0 5px var(--gold), 0 4px 20px rgba(0,0,0,0.6); }
        50%  { box-shadow: 0 0 20px var(--gold), 0 4px 20px rgba(0,0,0,0.6); }
        100% { box-shadow: 0 0 5px var(--gold), 0 4px 20px rgba(0,0,0,0.6); }
    }

    @keyframes buttonShake {
        0%, 100% { transform: translateX(-50%) rotate(0deg); }
        25%       { transform: translateX(-50%) rotate(-5deg); }
        75%       { transform: translateX(-50%) rotate(5deg); }
    }

    #reroll-btn:hover { background: #ffea00; }
    #reroll-btn:active { transform: translateX(-50%) scale(0.95); opacity: 0;}

    .rarity-grey   { border-bottom: 4px solid var(--grey); }
    .rarity-blue   { border-bottom: 4px solid var(--blue); }
    .rarity-purple { border-bottom: 4px solid var(--purple); }
    .rarity-red    { border-bottom: 4px solid var(--red); }
    .rarity-gold   { border-bottom: 4px solid var(--gold); }

    .settings-content { padding: 0 20px; display: none; flex-direction: column; height: 350px; margin-top: 10px; overflow-y: auto; scrollbar-width: none; }
    .section-label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #888; margin-bottom: 6px; display: block; }
    .setting-card { background: var(--card); border: 1px solid var(--accent); border-radius: 10px; padding: 10px; margin-bottom: 15px; }
    select { width: 100%; background: var(--input-bg); color: var(--input-text); border: 1px solid var(--accent); padding: 8px; border-radius: 6px; font-size: 12px; }
    #drop-zone { border: 2px dashed var(--accent); border-radius: 8px; padding: 15px; text-align: center; font-size: 10px; color: #888; cursor: pointer; }

    .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 10002; }
    .nav-btn { background: transparent; border: 1px solid var(--accent); color: #888; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; }
    .nav-btn:hover { color: var(--gold); border-color: var(--gold); transform: scale(1.15); box-shadow: 0 0 10px rgba(255,215,0,0.3); }

    .hidden { display: none !important; }
  </style>
</head>
<body id="main-body">
  <div id="internal-alert"></div>
  <div id="game-page">
    <div id="case-area">
        <div class="case-glow"></div>
        <img src="case.gif" id="case-gif">
        <div id="reveal-container"></div>
        <div id="viewport" class="hidden">
            <div id="magnifier"></div>
            <div id="slider"></div>
        </div>
    </div>
    <button id="reroll-btn"></button>
  </div>
  
  <div id="settings-page" class="settings-content">
    <div style="text-align: center; color: var(--gold); font-size: 13px; font-weight: 800; margin-bottom: 20px;">SETTINGS</div>
    <span class="section-label">Appearance</span>
    <div class="setting-card">
        <select id="theme-select"><option value="dark">Dark Theme</option><option value="light">Light Theme</option></select>
    </div>
    <span class="section-label">Audio & Volume</span>
    <div class="setting-card">
        <input type="range" id="vol-control" min="0" max="1" step="0.1" style="width:100%">
    </div>
    <span class="section-label">Image Pool (Drag & Drop)</span>
    <div class="setting-card">
        <div id="drop-zone">DROP IMAGES HERE OR CLICK</div>
        <input type="file" id="image-upload" multiple accept="image/*" style="display:none">
        <div id="image-manager" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px;"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button id="popout-btn" class="nav-btn" title="Pop-out Window"><i class="fas fa-external-link-alt"></i></button>
    <button id="nav-toggle" class="nav-btn"><i class="fas fa-cog"></i></button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
